<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MAFIA PHUKET | PRIVATE SOCIETY</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">

<style>
:root {
    --accent: #C1121F;
    --bg: #0a0a0a;
    --card: #141414;
    --text-main: #ffffff;
    --text-dim: #666;
    --border: #222;
}

body {
    font-family: 'Montserrat', sans-serif;
    background: var(--bg);
    color: var(--text-main);
    margin: 0;
    padding: 15px;
    -webkit-font-smoothing: antialiased;
    background-image: url("https://www.transparenttextures.com/patterns/carbon-fibre.png");
}

/* TABS */
.tabs {
    display: flex;
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,10,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
}

.tab-btn {
    flex: 1;
    background: none;
    border: none;
    color: var(--text-dim);
    padding: 15px 0;
    font-size: 11px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 2px;
    cursor: pointer;
    transition: color 0.2s ease;
}

.tab-btn.active {
    color: var(--text-main);
}

.tab-indicator {
    position: absolute;
    bottom: 0;
    height: 2px;
    width: 33.333%;
    background: var(--accent);
    transition: transform 0.3s ease;
}

/* PAGES */
.page {
    opacity: 0;
    transform: translateY(10px);
    pointer-events: none;
    transition: all 0.25s ease;
    position: absolute;
    width: 100%;
}

.page.active {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
    position: relative;
}

/* SPLASH */
.splash-screen {
    padding: 20px 0;
}

.splash-img {
    width: 80%;
    border-radius: 12px;
    border: 1px solid var(--border);
    box-shadow: 0 20px 40px rgba(0,0,0,0.8);
    margin-bottom: 30px;
}

.main-title {
    font-family: 'Playfair Display', serif;
    font-size: 42px;
    margin: 0;
}

.main-title span {
    color: var(--accent);
}

.sub-text {
    color: var(--text-dim);
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 5px;
    margin: 15px 0 40px;
}

/* CARD */
.game-card {
    background: var(--card);
    border-radius: 12px;
    padding: 25px;
    margin-bottom: 20px;
    border: 1px solid var(--border);
}

.info-block {
    margin-bottom: 20px;
}

.info-label {
    font-size: 9px;
    color: var(--accent);
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
}

.info-value {
    font-size: 16px;
}

/* BUTTONS */
.btn-group {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 30px;
}

.btn {
    width: 100%;
    padding: 18px 0;
    border-radius: 8px;
    border: none;
    font-weight: 800;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 2px;
    transition: all 0.2s ease;
    cursor: pointer;
}

.btn.go {
    background: var(--accent);
    color: white;
}

.btn.maybe {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
}

.btn.no {
    background: transparent;
    color: #444;
    font-size: 10px;
}

.btn:active {
    transform: scale(0.97);
}

/* PLAYERS */
.player-list {
    margin-top: 40px;
}

.list-header {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
}

.seats-count {
    color: var(--accent);
}

.player-item {
    padding: 15px 0;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 15px;
}

.avatar-stub {
    width: 35px;
    height: 35px;
    background: #1a1a1a;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: var(--accent);
}
</style>
</head>

<body>

<div class="tabs">
    <button class="tab-btn active" data-tab="splash">Society</button>
    <button class="tab-btn" data-tab="game">Session</button>
    <button class="tab-btn" data-tab="history">Ranks</button>
    <div class="tab-indicator"></div>
</div>

<!-- SPLASH -->
<div id="splash-tab" class="page active splash-screen">
    <img src="mafia.jpg" class="splash-img">
    <h1 class="main-title">MAFIA <span>PHUKET</span></h1>
    <p class="sub-text">Private Game Society</p>
    <button class="btn go" id="enter-btn">Enter Session</button>
</div>

<!-- GAME -->
<div id="game-tab" class="page">
    <div class="game-card">
        <div class="info-block">
            <div class="info-label">Time</div>
            <div class="info-value">Saturday · 19:30</div>
        </div>
        <div class="info-block">
            <div class="info-label">Location</div>
            <div class="info-value">Ali BBQ Kathu</div>
        </div>
        <div class="info-block">
            <div class="info-label">Buy-in</div>
            <div class="info-value">100 THB</div>
        </div>
    </div>

    <div class="btn-group">
        <button class="btn go" data-status="ЙДУ">Приєднатись</button>
        <button class="btn maybe" data-status="ДУМАЮ">Не впевнений</button>
        <button class="btn no" data-status="НІ">Відмовитись</button>
    </div>

    <div class="player-list">
        <div class="list-header">
            <span>Players</span>
            <span class="seats-count" id="seats-info">0 / 10</span>
        </div>
        <div id="list">Loading...</div>
    </div>
</div>

<!-- HISTORY -->
<div id="history-tab" class="page">
    <div id="list-history">Coming soon...</div>
</div>

<script>
let tg = window.Telegram.WebApp;
tg.expand();

const API_URL = "https://script.google.com/macros/s/AKfycbx78BBZhgPFEvWa1Nec7wItEEFAWtI8m6G4yCH8DY6oZAnGyGXfOw54LY8CdK09Z36nig/exec";

const tabs = document.querySelectorAll('.tab-btn');
const indicator = document.querySelector('.tab-indicator');

const pages = {
    splash: document.getElementById('splash-tab'),
    game: document.getElementById('game-tab'),
    history: document.getElementById('history-tab')
};

tabs.forEach((tab, index) => {
    tab.addEventListener('click', () => switchTab(tab.dataset.tab, index));
});

document.getElementById('enter-btn').onclick = () => switchTab('game', 1);

function switchTab(tab, index) {
    tabs.forEach(t => t.classList.remove('active'));
    tabs[index].classList.add('active');

    Object.values(pages).forEach(p => p.classList.remove('active'));
    pages[tab].classList.add('active');

    indicator.style.transform = `translateX(${index * 100}%)`;

    if (tab === 'game') loadPlayers();
}

async function joinGame(status) {
    let user = tg.initDataUnsafe.user;
    let name = user ? (user.first_name + " " + (user.last_name || "")) : "Guest";
    let username = user?.username ? "@" + user.username : "";

    await fetch(API_URL, {
        method: 'POST',
        mode: 'no-cors',
        body: JSON.stringify({
            ID: String(user?.id || Date.now()),
            Name: name,
            Status: status,
            Username: username
        })
    });

    setTimeout(loadPlayers, 800);
}

document.querySelectorAll('.btn[data-status]').forEach(btn => {
    btn.addEventListener('click', () => joinGame(btn.dataset.status));
});

async function loadPlayers() {
    try {
        let res = await fetch(API_URL);
        let data = await res.json();

        let list = document.getElementById('list');
        let going = data.filter(p => p.Status === 'ЙДУ');

        document.getElementById('seats-info').innerText =
            going.length + " / 10";

        list.innerHTML = "";

        data.filter(p => p.Status !== 'НІ').forEach(p => {
            let initials = p.Name.split(' ').map(n => n[0]).join('').substring(0,2).toUpperCase();

            list.innerHTML += `
                <div class="player-item">
                    <div class="avatar-stub">${initials}</div>
                    <div>${p.Name}</div>
                </div>`;
        });

    } catch {
        document.getElementById('list').innerText = "Error loading...";
    }
}

window.onload = () => {
    indicator.style.transform = `translateX(0%)`;
};
</script>

</body>
</html>
