<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAFIA PHUKET | EXCLUSIVE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #C1121F;
            --maybe-color: #d4a017;
            --bg: #0a0a0a;
            --card: rgba(20, 20, 20, 0.7);
            --text-main: #ffffff;
            --text-dim: #666;
            --border: rgba(255, 255, 255, 0.1);
        }

        body { 
            font-family: 'Montserrat', sans-serif; 
            background: var(--bg);
            color: var(--text-main); 
            margin: 0; padding: 15px;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* GRAIN OVERLAY */
        body::before {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("https://www.transparenttextures.com/patterns/stardust.png");
            opacity: 0.03; pointer-events: none; z-index: 9999;
        }

        /* ТАБИ */
        .tabs { 
            display: flex; justify-content: center; position: sticky; top: 0; z-index: 100;
            background: rgba(10,10,10,0.85); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); margin-bottom: 30px;
            position: relative;
        }
        .tab-btn { 
            flex: 1; background: none; border: none; color: var(--text-dim); 
            padding: 15px 0; font-size: 11px; font-weight: 800; 
            text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; 
            cursor: pointer;
        }
        .tab-btn.active { color: var(--text-main); }
        .tab-indicator {
            position: absolute; bottom: 0; left: 0; height: 2px; width: 33.333%;
            background: var(--accent); transition: transform 0.4s cubic-bezier(0.65, 0, 0.35, 1);
            box-shadow: 0 0 15px var(--accent);
        }

        /* СТОРІНКИ */
        .page { display: none; flex-direction: column; align-items: center; width: 100%; text-align: center; }
        .page.active { display: flex; animation: pageIn 0.5s ease forwards; }

        @keyframes pageIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ГОЛОВНА */
        .splash-img { 
            width: 85%; max-width: 300px; margin: 20px auto 35px;
            border-radius: 12px; border: 1px solid var(--border);
            box-shadow: 0 0 40px rgba(193, 18, 31, 0.2);
            animation: glow 4s infinite alternate;
        }
        @keyframes glow {
            from { box-shadow: 0 0 20px rgba(193, 18, 31, 0.1); }
            to { box-shadow: 0 0 50px rgba(193, 18, 31, 0.3); }
        }
        .main-title { font-family: 'Playfair Display', serif; font-size: 42px; margin: 0; letter-spacing: -1px; line-height: 1.1; }
        .main-title span { color: var(--accent); }
        .sub-text { color: var(--text-dim); font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 4px; margin: 15px 0 45px; }

        /* КАРТКА ГРИ (Glassmorphism) */
        .game-card { 
            background: var(--card); backdrop-filter: blur(15px);
            border-radius: 16px; padding: 25px; 
            margin-bottom: 25px; border: 1px solid var(--border); 
            text-align: left; width: 100%; box-sizing: border-box;
        }
        .info-label { font-size: 9px; color: var(--accent); font-weight: 800; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; }
        .info-value { font-size: 16px; font-weight: 400; color: #eee; }

        /* КНОПКИ */
        .btn { 
            width: 100%; padding: 18px 0; border-radius: 10px; border: none; 
            font-weight: 800; font-size: 12px; text-transform: uppercase; 
            letter-spacing: 2px; transition: all 0.3s ease; cursor: pointer;
            background: var(--accent); color: white; box-shadow: 0 8px 20px rgba(193, 18, 31, 0.2);
        }
        .btn:active { transform: scale(0.96); }
        .btn-group { display: flex; flex-direction: column; gap: 12px; width: 100%; margin-bottom: 30px; }
        .btn.maybe { background: transparent; border: 1px solid #333; color: #aaa; box-shadow: none; }
        .btn.no { background: transparent; color: #444; font-size: 10px; margin-top: 5px; letter-spacing: 3px; box-shadow: none; }

        /* П'ЄДЕСТАЛ */
        .top-three { display: flex; justify-content: space-around; align-items: flex-end; margin: 20px 0 40px; width: 100%; }
        .podium-item { text-align: center; width: 30%; }
        .avatar { 
            width: 55px; height: 55px; background: #111; border: 2px solid var(--border); 
            border-radius: 50%; margin: 0 auto 10px; display: flex; align-items: center; 
            justify-content: center; font-size: 22px; 
        }
        .p1 .avatar { width: 80px; height: 80px; border-color: #ffd700; font-size: 35px; box-shadow: 0 0 25px rgba(255, 215, 0, 0.15); }
        .p2 .avatar { border-color: #c0c0c0; }
        .p3 .avatar { border-color: #cd7f32; }
        .p-name { font-size: 11px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; margin-bottom: 4px; }
        .p-pts { color: var(--accent); font-weight: 800; font-size: 16px; }

        /* СПИСОК РЕЙТИНГУ / ГРАВЦІВ */
        .rank-item { 
            display: flex; align-items: center; padding: 15px; background: rgba(255,255,255,0.03); 
            border-radius: 12px; margin-bottom: 10px; border: 1px solid var(--border); width: 100%; box-sizing: border-box; 
        }
        .r-pos { width: 30px; font-size: 10px; font-weight: 800; color: var(--text-dim); text-align: left; }
        .r-name-box { flex-grow: 1; text-align: left; }
        .r-name { font-size: 15px; font-weight: 500; }
        .r-name a { color: inherit; text-decoration: none; }
        .r-status { font-size: 8px; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; display: block; margin-top: 3px; }
        .r-pts { font-weight: 800; color: var(--accent); font-size: 16px; }
        
        .list-section-title {
            font-size: 10px; font-weight: 800; color: var(--text-dim);
            text-transform: uppercase; letter-spacing: 2px;
            margin: 30px 0 15px; border-left: 2px solid var(--accent); padding-left: 12px;
            width: 100%; text-align: left;
        }
        .avatar-stub { width: 38px; height: 38px; background: #111; border: 1px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; color: var(--text-dim); margin-right: 15px; }
        .status-maybe { opacity: 0.6; }
    </style>
</head>
<body>
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('splash', 0)">Клуб</button>
        <button class="tab-btn" onclick="switchTab('game', 1)">Гра</button>
        <button class="tab-btn" onclick="switchTab('history', 2)">Рейтинг</button>
        <div class="tab-indicator" id="indicator"></div>
    </div>

    <div id="splash-tab" class="page active">
        <img src="https://raw.githubusercontent.com/fallsins/MafiaPhuket/main/mafia.jpg" class="splash-img">
        <h1 class="main-title">MAFIA <span>PHUKET</span></h1>
        <p class="sub-text">Elite Social Club</p>
        <button class="btn" onclick="switchTab('game', 1)">Записатись на гру</button>
    </div>

    <div id="game-tab" class="page">
        <div class="game-card">
            <div style="margin-bottom:15px;"><div class="info-label">Час</div><div class="info-value">Субота · 19:30</div></div>
            <div style="margin-bottom:15px;"><div class="info-label">Локація</div><div class="info-value">Ali BBQ Kathu</div></div>
            <div><div class="info-label">Внесок</div><div class="info-value">100 THB</div></div>
        </div>
        <div class="btn-group">
            <button class="btn" onclick="joinGame('ЙДУ')">Я буду на грі</button>
            <button class="btn maybe" onclick="joinGame('ДУМАЮ')">Не впевнений</button>
            <button class="btn no" onclick="joinGame('НІ')">Відмовитись</button>
        </div>
        <div id="list" style="width: 100%;"></div>
    </div>

    <div id="history-tab" class="page">
        <div id="leaderboard" style="width:100%;">
            <p style="padding-top:50px; opacity:0.5;">Завантаження рейтингу...</p>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        const API_URL = "https://script.google.com/macros/s/AKfycbzGuW-sSfmNeI9Feo6HmOgXusLM0SaBPhq_1t8-_Kb-gJyEODEABnfGp9X5BveUSHtu2w/exec";

        function switchTab(id, idx) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id + '-tab').classList.add('active');
            document.querySelectorAll('.tab-btn')[idx].classList.add('active');
            document.getElementById('indicator').style.transform = `translateX(${idx * 100}%)`;
            if(id === 'game') loadPlayers();
            if(id === 'history') loadRanking();
        }

        const formatName = (p) => {
            if (p && p.Username) return `<a onclick="tg.openTelegramLink('https://t.me/${p.Username.replace('@','')}')">${p.Name}</a>`;
            return p ? p.Name : '-';
        };

        async function loadRanking() {
            const cont = document.getElementById('leaderboard');
            try {
                let res = await fetch(API_URL + "?action=getRanking");
                let players = await res.json();
                players.sort((a, b) => b.Points - a.Points);

                let html = `<div class="top-three">
                    <div class="podium-item p2"><div class="avatar">🥈</div><div class="p-name">${formatName(players[1])}</div><div class="p-pts">${players[1]?.Points || 0}</div></div>
                    <div class="podium-item p1"><div class="avatar">🥇</div><div class="p-name">${formatName(players[0])}</div><div class="p-pts">${players[0]?.Points || 0}</div></div>
                    <div class="podium-item p3"><div class="avatar">🥉</div><div class="p-name">${formatName(players[2])}</div><div class="p-pts">${players[2]?.Points || 0}</div></div>
                </div>`;

                players.slice(3).forEach((p, i) => {
                    html += `<div class="rank-item"><div class="r-pos">${i+4}</div><div class="r-name-box"><span class="r-name">${formatName(p)}</span><span class="r-status">${p.Status || 'ГРАВЕЦЬ'}</span></div><div class="r-pts">${p.Points}</div></div>`;
                });
                cont.innerHTML = html;
            } catch(e) { cont.innerHTML = "<p>Помилка завантаження рейтингу</p>"; }
        }

        async function loadPlayers() {
            try {
                let res = await fetch(API_URL);
                let data = await res.json();
                let going = data.filter(p => p.Status === 'ЙДУ');
                let maybe = data.filter(p => p.Status === 'ДУМАЮ');
                let html = "";

                if (going.length > 0) {
                    html += `<div class="list-section-title">Підтвердили (${going.length})</div>`;
                    going.forEach(p => {
                        let ini = p.Name.split(' ').filter(n=>n).map(n=>Array.from(n)[0]).join('').toUpperCase().substring(0,2);
                        html += `<div class="rank-item" style="padding:10px 15px;"><div class="avatar-stub">${ini}</div><div class="r-name-box"><span class="r-name">${formatName(p)}</span></div></div>`;
                    });
                }
                if (maybe.length > 0) {
                    html += `<div class="list-section-title" style="border-color:var(--maybe-color)">У роздумах (${maybe.length})</div>`;
                    maybe.forEach(p => {
                        let ini = p.Name.split(' ').filter(n=>n).map(n=>Array.from(n)[0]).join('').toUpperCase().substring(0,2);
                        html += `<div class="rank-item status-maybe" style="padding:10px 15px;"><div class="avatar-stub">${ini}</div><div class="r-name-box"><span class="r-name">${p.Name}</span></div></div>`;
                    });
                }
                document.getElementById('list').innerHTML = html || "<p style='padding:40px; opacity:0.5;'>Список порожній</p>";
            } catch(e) { }
        }

        async function joinGame(st) {
            let u = tg.initDataUnsafe.user;
            await fetch(API_URL, { method:'POST', mode:'no-cors', body: JSON.stringify({ ID: String(u?.id || 0), Name: u ? (u.first_name + ' ' + (u.last_name || '')) : "Гість", Status: st, Username: u?.username || "" }) });
            loadPlayers();
        }

        window.onload = () => {
            document.getElementById('indicator').style.transform = `translateX(0%)`;
            loadRanking();
        };
    </script>
</body>
</html>
