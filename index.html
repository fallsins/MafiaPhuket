<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAFIA PHUKET | PRIVATE SOCIETY</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #C1121F; /* Deep Red */
            --bg: #0a0a0a;
            --card: #141414;
            --text-main: #ffffff;
            --text-dim: #666;
            --border: #222;
        }

        body { 
            font-family: 'Montserrat', sans-serif; 
            background: var(--bg);
            color: var(--text-main); 
            margin: 0; padding: 15px;
            -webkit-font-smoothing: antialiased;
            /* Ефект зернистості на фоні */
            background-image: url("https://www.transparenttextures.com/patterns/carbon-fibre.png");
        }

        /* ТАБИ (Minimalist) */
        .tabs { 
            display: flex; justify-content: center; gap: 20px;
            margin-bottom: 30px; border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100; background: rgba(10,10,10,0.9);
            backdrop-filter: blur(10px);
        }
        .tab-btn { 
            background: none; border: none; color: var(--text-dim); 
            padding: 15px 5px; font-size: 11px; font-weight: 800; 
            text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; 
        }
        .tab-btn.active { color: var(--accent); border-bottom: 2px solid var(--accent); }

        /* ГОЛОВНА (Premium Splash) */
        .splash-screen { padding: 20px 0; animation: fadeInSlide 0.8s ease-out; }
        .splash-img { 
            width: 80%; border-radius: 12px; border: 1px solid var(--border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.8); margin-bottom: 30px;
        }
        .main-title { 
            font-family: 'Playfair Display', serif; font-size: 42px; 
            margin: 0; letter-spacing: -1px; line-height: 1;
        }
        .main-title span { color: var(--accent); }
        .sub-text { 
            color: var(--text-dim); font-size: 10px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 5px; margin: 15px 0 40px; 
        }

        /* КАРТКА ГРИ (Clean Info) */
        .game-card { 
            background: var(--card); border-radius: 12px; padding: 25px; 
            margin-bottom: 20px; border: 1px solid var(--border); text-align: left;
        }
        .info-block { margin-bottom: 20px; }
        .info-label { font-size: 9px; color: var(--accent); font-weight: 800; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; }
        .info-value { font-size: 16px; font-weight: 400; color: #eee; letter-spacing: 0.5px; }

        /* КНОПКИ (Premium UX) */
        .btn-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 30px; }
        .btn { 
            width: 100%; padding: 18px 0; border-radius: 8px; border: none; 
            font-weight: 800; font-size: 12px; text-transform: uppercase; 
            letter-spacing: 2px; transition: all 0.2s ease; cursor: pointer;
        }
        .btn.go { 
            background: var(--accent); color: white; 
            box-shadow: 0 4px 15px rgba(193, 18, 31, 0.3);
        }
        .btn.maybe { background: transparent; border: 1px solid var(--border); color: var(--text-dim); }
        .btn.no { background: transparent; color: #444; font-size: 10px; margin-top: 5px; }
        .btn:active { transform: scale(0.97); opacity: 0.8; }

        /* СПИСОК ГРАВЦІВ */
        .player-list { text-align: left; margin-top: 40px; }
        .list-header { 
            display: flex; justify-content: space-between; align-items: center;
            font-size: 11px; font-weight: 800; color: var(--text-dim); 
            text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px;
        }
        .seats-count { color: var(--accent); }
        .player-item { 
            padding: 15px 0; border-bottom: 1px solid var(--border); 
            display: flex; align-items: center; gap: 15px;
        }
        .avatar-stub {
            width: 35px; height: 35px; background: #1a1a1a; border: 1px solid var(--border);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: 800; color: var(--accent);
        }
        .player-name { font-weight: 400; font-size: 15px; flex-grow: 1; }
        .player-name a { color: inherit; text-decoration: none; }

        @keyframes fadeInSlide {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('splash')">Society</button>
        <button class="tab-btn" onclick="switchTab('game')">Session</button>
        <button class="tab-btn" onclick="switchTab('history')">Ranks</button>
    </div>

    <div id="splash-tab" class="splash-screen">
        <img src="mafia.jpg" class="splash-img">
        <h1 class="main-title">MAFIA <span>PHUKET</span></h1>
        <p class="sub-text">Private Game Society</p>
        <button class="btn go" onclick="switchTab('game')">Enter Session</button>
    </div>

    <div id="game-tab" style="display:none;">
        <div class="game-card">
            <div class="info-block">
                <div class="info-label">Time</div>
                <div class="info-value">Saturday · 19:30</div>
            </div>
            <div class="info-block">
                <div class="info-label">Location</div>
                <div class="info-value">Ali BBQ Kathu</div>
            </div>
            <div class="info-block">
                <div class="info-label">Buy-in</div>
                <div class="info-value">100 THB</div>
            </div>
        </div>
        
        <div class="btn-group">
            <button class="btn go" onclick="joinGame('ЙДУ')">Приєднатись</button>
            <button class="btn maybe" onclick="joinGame('ДУМАЮ')">Не впевнений</button>
            <button class="btn no" onclick="joinGame('НІ')">Відмовитись</button>
        </div>

        <div class="player-list">
            <div class="list-header">
                <span>Players</span>
                <span class="seats-count" id="seats-info">0 / 10 SEATS</span>
            </div>
            <div id="list">Завантаження...</div>
        </div>
    </div>

    <div id="history-tab" style="display:none;">
        <div id="list-history"></div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        const API_URL = "https://script.google.com/macros/s/AKfycbx78BBZhgPFEvWa1Nec7wItEEFAWtI8m6G4yCH8DY6oZAnGyGXfOw54LY8CdK09Z36nig/exec";

        function switchTab(tab) {
            document.getElementById('splash-tab').style.display = tab === 'splash' ? 'block' : 'none';
            document.getElementById('game-tab').style.display = tab === 'game' ? 'block' : 'none';
            document.getElementById('history-tab').style.display = tab === 'history' ? 'block' : 'none';
            document.querySelectorAll('.tab-btn').forEach((btn, idx) => {
                btn.classList.remove('active');
                if ((tab === 'splash' && idx === 0) || (tab === 'game' && idx === 1) || (tab === 'history' && idx === 2)) btn.classList.add('active');
            });
            if(tab === 'game') loadPlayers();
        }

        function openProfile(username) {
            if (username) tg.openTelegramLink('https://t.me/' + username.replace('@', ''));
        }

        async function joinGame(status) {
            let user = tg.initDataUnsafe.user;
            let name = user ? (user.first_name + " " + (user.last_name || "")) : "Guest";
            let username = user?.username ? "@" + user.username : ""; 
            await fetch(API_URL, {
                method: 'POST', mode: 'no-cors',
                body: JSON.stringify({"ID": String(user?.id || Date.now()), "Name": name, "Status": status, "Username": username})
            });
            setTimeout(loadPlayers, 800);
        }

        async function loadPlayers() {
            try {
                let res = await fetch(API_URL);
                let data = await res.json();
                let list = document.getElementById('list');
                let going = data.filter(p => p.Status === 'ЙДУ');
                document.getElementById('seats-info').innerText = going.length + " / 10 SEATS FILLED";
                
                list.innerHTML = "";
                data.filter(p => p.Status !== 'НІ').forEach((p, i) => {
                    let initials = p.Name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
                    list.innerHTML += `
                        <div class="player-item">
                            <div class="avatar-stub">${initials}</div>
                            <div class="player-name"><a onclick="openProfile('${p.Username}')">${p.Name}</a></div>
                        </div>`;
                });
            } catch (e) { list.innerHTML = "Error loading..."; }
        }
        window.onload = () => switchTab('splash');
    </script>
</body>
</html>
