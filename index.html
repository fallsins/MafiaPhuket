<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAFIA PHUKET | EXCLUSIVE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Montserrat', sans-serif; 
            background: radial-gradient(circle at center, #1c1c1c 0%, #0a0a0a 100%); 
            color: #ffffff; 
            text-align: center; 
            margin: 0; 
            padding: 10px; 
            -webkit-font-smoothing: antialiased;
        }

        /* ТАБИ */
        .tabs { 
            display: flex; 
            justify-content: center; 
            margin-bottom: 20px; 
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid #333;
            position: sticky; top: 0; z-index: 100;
        }
        .tab-btn { 
            background: none; border: none; color: #777; 
            padding: 15px 20px; font-size: 12px; font-weight: 800; 
            text-transform: uppercase; letter-spacing: 1.5px; transition: 0.3s; 
        }
        .tab-btn.active { color: #ff4d4d; border-bottom: 2px solid #ff4d4d; }

        /* ГОЛОВНА */
        .splash-screen { padding: 20px 0; animation: fadeIn 0.8s ease-in; }
        .splash-img { width: 85%; border-radius: 20px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.7); }
        .main-title { font-family: 'Playfair Display', serif; font-size: 38px; margin: 20px 0 5px; letter-spacing: 2px; }
        .main-title span { color: #ff4d4d; text-shadow: 0 0 15px rgba(255, 77, 77, 0.4); }
        .sub-text { color: #888; font-size: 13px; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 30px; }

        /* КАРТКА ГРИ */
        .game-card { 
            background: #141414; border-radius: 15px; padding: 20px; 
            margin-bottom: 20px; border: 1px solid #252525; text-align: left;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .game-card h2 { 
            font-size: 14px; text-transform: uppercase; letter-spacing: 2px;
            color: #ff4d4d; margin: 0 0 15px 0; font-weight: 800;
        }
        .info-row { display: flex; align-items: center; margin: 10px 0; font-size: 16px; font-weight: 600; color: #eee; }

        /* КНОПКИ */
        .btn-group { display: flex; gap: 10px; margin-bottom: 25px; }
        .btn { 
            flex: 1; padding: 18px 0; border-radius: 12px; border: none; 
            font-weight: 800; font-size: 12px; text-transform: uppercase; 
            letter-spacing: 1px; transition: 0.2s; 
        }
        .splash-screen .btn.go { background: transparent; border: 2px solid #ff4d4d; color: #ff4d4d; width: 100%; max-width: 250px; }
        .btn.go { background: #27ae60; color: white; }
        .btn.maybe { background: #f1c40f; color: #000; }
        .btn.no { background: #c0392b; color: white; }
        .btn:active { transform: scale(0.95); }

        /* СПИСОК */
        .player-list { 
            background: #141414; padding: 20px; border-radius: 20px; 
            border: 1px solid #252525; text-align: left;
        }
        .list-header { 
            font-size: 13px; font-weight: 800; color: #666; 
            text-transform: uppercase; letter-spacing: 2px;
            margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 10px;
        }
        .player-item { 
            padding: 12px 0; border-bottom: 1px solid #1a1a1a; 
            display: flex; justify-content: space-between; align-items: center; 
        }
        .player-item span { font-weight: 600; font-size: 15px; }
        .player-item a { color: #4da6ff; text-decoration: none; }
        .status-badge { 
            font-size: 9px; padding: 5px 10px; border-radius: 6px; 
            font-weight: 900; border: 1px solid rgba(255,255,255,0.1); text-transform: uppercase;
        }
        .reserve-divider { 
            color: #444; text-align: center; padding: 20px 0; 
            font-size: 10px; font-weight: 800; letter-spacing: 3px;
        }

        /* ІСТОРІЯ */
        .history-item { 
            background: #141414; padding: 15px; border-radius: 12px; 
            border: 1px solid #252525; margin-bottom: 10px; text-align: left;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('splash')">Клуб</button>
        <button class="tab-btn" onclick="switchTab('game')">Запис</button>
        <button class="tab-btn" onclick="switchTab('history')">Рейтинг</button>
    </div>

    <div id="splash-tab" class="splash-screen">
        <img src="mafia.jpg" class="splash-img">
        <h1 class="main-title">MAFIA <span>PHUKET</span></h1>
        <p class="sub-text">Exclusive Intellectual Club</p>
        <button class="btn go" onclick="switchTab('game')">Записатися на гру</button>
    </div>

    <div id="game-tab" style="display:none;">
        <div class="game-card">
            <h2>Інформація про гру</h2>
            <div class="info-row">📅 Субота, 19:30</div>
            <div class="info-row">📍 Ali BBQ Kathu</div>
            <div class="info-row">💵 100 THB</div>
        </div>
        
        <div class="btn-group">
            <button class="btn go" onclick="joinGame('ЙДУ')">Буду</button>
            <button class="btn maybe" onclick="joinGame('ДУМАЮ')">Думаю</button>
            <button class="btn no" onclick="joinGame('НІ')">Не буду</button>
        </div>

        <div class="player-list">
            <div class="list-header">Учасники вечора</div>
            <div id="list">Завантаження...</div>
        </div>
    </div>

    <div id="history-tab" style="display:none;">
        <div id="history-list">Завантаження статистики...</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        const API_URL = "https://script.google.com/macros/s/AKfycbx78BBZhgPFEvWa1Nec7wItEEFAWtI8m6G4yCH8DY6oZAnGyGXfOw54LY8CdK09Z36nig/exec";

        function switchTab(tab) {
            document.getElementById('splash-tab').style.display = tab === 'splash' ? 'block' : 'none';
            document.getElementById('game-tab').style.display = tab === 'game' ? 'block' : 'none';
            document.getElementById('history-tab').style.display = tab === 'history' ? 'block' : 'none';
            
            document.querySelectorAll('.tab-btn').forEach((btn, idx) => {
                btn.classList.remove('active');
                if ((tab === 'splash' && idx === 0) || (tab === 'game' && idx === 1) || (tab === 'history' && idx === 2)) {
                    btn.classList.add('active');
                }
            });

            if(tab === 'game') loadPlayers();
            if(tab === 'history') loadHistory();
        }

        function openProfile(username) {
            if (username) {
                const cleanUser = username.replace('@', '').trim();
                tg.openTelegramLink('https://t.me/' + cleanUser);
            }
        }

        async function joinGame(status) {
            let user = tg.initDataUnsafe.user;
            let name = user ? (user.first_name + " " + (user.last_name || "")) : "Гість";
            let rawUsername = user?.username || "";
            let username = rawUsername ? "@" + rawUsername : ""; 
            let id = String(user?.id || Date.now());

            document.getElementById('list').innerHTML = "Оновлення...";

            try {
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({"ID": id, "Name": name, "Status": status, "Username": username})
                });
                setTimeout(loadPlayers, 800);
            } catch (e) { loadPlayers(); }
        }

        async function loadPlayers() {
            try {
                let res = await fetch(API_URL);
                let data = await res.json();
                let list = document.getElementById('list');
                list.innerHTML = "";
                
                let players = data.filter(p => p.Status !== 'НІ');
                let going = players.filter(p => p.Status === 'ЙДУ');
                let maybe = players.filter(p => p.Status === 'ДУМАЮ');
                let sortedList = [...going, ...maybe];

                if (sortedList.length === 0) { list.innerHTML = "Списку поки немає"; return; }

                sortedList.forEach((p, i) => {
                    let color = p.Status === 'ЙДУ' ? '#2ecc71' : '#f1c40f';
                    let userRef = p.Username || "";

                    if (i === 15 || (p.Status === 'ДУМАЮ' && i === going.length && going.length > 0)) {
                        list.innerHTML += `<div class="reserve-divider">——— РЕЗЕРВ ———</div>`;
                    }

                    list.innerHTML += `
                        <div class="player-item">
                            <span>${i+1}. <a onclick="openProfile('${userRef}')">${p.Name}</a></span>
                            <span class="status-badge" style="color:${color}; border-color:${color}">${p.Status}</span>
                        </div>`;
                });
            } catch (e) { document.getElementById('list').innerHTML = "Помилка завантаження"; }
        }

        async function loadHistory() {
            try {
                let res = await fetch(API_URL + "?sheet=History");
                let data = await res.json();
                let hist = document.getElementById('history-list');
                hist.innerHTML = "";
                if (data.length === 0) { hist.innerHTML = "Історія порожня"; return; }
                data.reverse().forEach(h => {
                    let isWin = h.Result?.toLowerCase() === 'win';
                    hist.innerHTML += `<div class="history-item">
                        <span style="color:#666; font-size:10px; font-weight:800; text-transform:uppercase;">${h.Date}</span><br>
                        <div style="margin-top:5px; font-weight:600;">${h.Player_Name} (${h.Role}) — <span style="color:${isWin?'#2ecc71':'#e74c3c'}">${isWin ? 'ПЕРЕМОГА' : 'ПОРАЗКА'}</span></div>
                    </div>`;
                });
            } catch (e) { document.getElementById('history-list').innerHTML = "Помилка статистики"; }
        }
        window.onload = loadPlayers;
    </script>
</body>
</html>
