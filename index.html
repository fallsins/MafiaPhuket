<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAFIA PHUKET | EXCLUSIVE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #C1121F;
            --maybe-color: #d4a017;
            --bg: #0a0a0a;
            --card: rgba(20, 20, 20, 0.7);
            --text: #fff;
            --dim: #666;
            --border: rgba(255, 255, 255, 0.1);
        }

        body { 
            font-family: 'Montserrat', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; padding: 15px; 
            overflow-x: hidden; 
            -webkit-font-smoothing: antialiased; 
        }

        /* GRAIN OVERLAY - Повернув текстуру */
        body::before {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("https://www.transparenttextures.com/patterns/stardust.png");
            opacity: 0.03; pointer-events: none; z-index: 9999;
        }

        /* ТАБИ */
        .tabs { 
            display: flex; justify-content: center; position: sticky; top: 0; z-index: 100;
            background: rgba(10,10,10,0.85); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); margin-bottom: 30px;
            position: relative;
        }
        .tab-btn { 
            flex: 1; background: none; border: none; color: var(--dim); 
            padding: 15px 0; font-size: 11px; font-weight: 800; 
            text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; 
            cursor: pointer;
        }
        .tab-btn.active { color: var(--text); }
        .tab-indicator {
            position: absolute; bottom: 0; left: 0; height: 2px; width: 33.333%;
            background: var(--accent); transition: transform 0.4s cubic-bezier(0.65, 0, 0.35, 1);
            box-shadow: 0 0 15px var(--accent);
        }

        .page { display: none; flex-direction: column; width: 100%; align-items: center; }
        .page.active { display: flex; animation: pageIn 0.5s ease forwards; }

        @keyframes pageIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ГОЛОВНА */
        .splash-img { 
            width: 85%; max-width: 300px; margin: 20px auto 35px;
            border-radius: 12px; border: 1px solid var(--border);
            box-shadow: 0 0 40px rgba(193, 18, 31, 0.2);
            animation: glow 4s infinite alternate;
        }
        @keyframes glow {
            from { box-shadow: 0 0 20px rgba(193, 18, 31, 0.1); }
            to { box-shadow: 0 0 50px rgba(193, 18, 31, 0.3); }
        }
        .main-title { font-family: 'Playfair Display', serif; font-size: 42px; margin: 0; letter-spacing: -1px; text-align: center; }
        .main-title span { color: var(--accent); }

        /* П'ЄДЕСТАЛ */
        .top-three { display: flex; justify-content: space-around; align-items: flex-end; margin: 30px 0 40px; width: 100%; }
        .podium-item { text-align: center; width: 30%; position: relative; }
        .avatar { width: 55px; height: 55px; background: #111; border: 2px solid var(--border); border-radius: 50%; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 22px; transition: 0.3s; }
        .p1 .avatar { width: 80px; height: 80px; border-color: #ffd700; font-size: 35px; box-shadow: 0 0 25px rgba(255, 215, 0, 0.2); }
        .p2 .avatar { border-color: #c0c0c0; }
        .p3 .avatar { border-color: #cd7f32; }
        .p-name { font-size: 11px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; margin-bottom: 4px; }
        .p-pts { color: var(--accent); font-weight: 800; font-size: 16px; }

        /* СПИСОК РЕЙТИНГУ */
        .rank-item { display: flex; align-items: center; padding: 15px; background: rgba(255,255,255,0.03); border-radius: 12px; margin-bottom: 8px; border: 1px solid var(--border); width: 100%; box-sizing: border-box; }
        .r-pos { width: 30px; font-size: 10px; font-weight: 800; color: var(--dim); }
        .r-name-box { flex-grow: 1; text-align: left; }
        .r-name { font-size: 14px; font-weight: 500; }
        .r-name a { color: inherit; text-decoration: none; border-bottom: 1px solid transparent; transition: 0.2s; }
        .r-status { font-size: 8px; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; display: block; margin-top: 3px; }
        .r-pts { font-weight: 800; color: var(--accent); font-size: 15px; }
        
        .btn { width: 100%; padding: 18px; background: var(--accent); color: white; border: none; border-radius: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; box-shadow: 0 5px 15px rgba(193, 18, 31, 0.2); transition: 0.3s; }
        .btn:active { transform: scale(0.98); opacity: 0.9; }
        .avatar-stub { width: 40px; height: 40px; background: #111; border: 1px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; color: var(--dim); margin-right: 15px; }
    </style>
</head>
<body>
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('splash', 0)">Клуб</button>
        <button class="tab-btn" onclick="switchTab('game', 1)">Гра</button>
        <button class="tab-btn" onclick="switchTab('history', 2)">Рейтинг</button>
        <div class="tab-indicator" id="indicator"></div>
    </div>

    <div id="splash-tab" class="page active" style="text-align:center; padding-top:10px;">
        <img src="https://raw.githubusercontent.com/fallsins/MafiaPhuket/main/mafia.jpg" class="splash-img">
        <h1 class="main-title">MAFIA <span>PHUKET</span></h1>
        <p style="color:var(--dim); font-size:10px; letter-spacing:4px; text-transform:uppercase; margin:15px 0 40px;">Elite Social Club</p>
        <button class="btn" onclick="switchTab('game', 1)">Записатись на гру</button>
    </div>

    <div id="game-tab" class="page">
        <button class="btn" onclick="joinGame('ЙДУ')" style="margin: 20px 0;">Я БУДУ НА ГРІ</button>
        <div id="list" style="width: 100%;"></div>
    </div>

    <div id="history-tab" class="page">
        <div id="leaderboard" style="width:100%;">
            <p style="text-align:center; padding-top:50px; opacity:0.5;">Завантаження рейтингу...</p>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        const API_URL = "https://script.google.com/macros/s/AKfycbzGuW-sSfmNeI9Feo6HmOgXusLM0SaBPhq_1t8-_Kb-gJyEODEABnfGp9X5BveUSHtu2w/exec";

        function switchTab(id, idx) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id + '-tab').classList.add('active');
            document.querySelectorAll('.tab-btn')[idx].classList.add('active');
            document.getElementById('indicator').style.transform = `translateX(${idx * 100}%)`;
            
            if(id === 'game') loadPlayers();
            if(id === 'history') loadRanking();
        }

        const formatName = (p) => {
            if (p && p.Username) {
                return `<a onclick="tg.openTelegramLink('https://t.me/${p.Username.replace('@','')}')">${p.Name}</a>`;
            }
            return p ? p.Name : '-';
        };

        async function loadRanking() {
            const cont = document.getElementById('leaderboard');
            try {
                let res = await fetch(API_URL + "?action=getRanking");
                let players = await res.json();
                players.sort((a, b) => b.Points - a.Points);

                let html = `<div class="top-three">
                    <div class="podium-item p2"><div class="avatar">🥈</div><div class="p-name">${formatName(players[1])}</div><div class="p-pts">${players[1]?.Points || 0}</div></div>
                    <div class="podium-item p1"><div class="avatar">🥇</div><div class="p-name">${formatName(players[0])}</div><div class="p-pts">${players[0]?.Points || 0}</div></div>
                    <div class="podium-item p3"><div class="avatar">🥉</div><div class="p-name">${formatName(players[2])}</div><div class="p-pts">${players[2]?.Points || 0}</div></div>
                </div><div style="width:100%;">`;

                players.slice(3).forEach((p, i) => {
                    html += `<div class="rank-item"><div class="r-pos">${i+4}</div><div class="r-name-box"><span class="r-name">${formatName(p)}</span><span class="r-status">${p.Status || ''}</span></div><div class="r-pts">${p.Points}</div></div>`;
                });
                cont.innerHTML = html + "</div>";
            } catch(e) { cont.innerHTML = "<p style='text-align:center;'>Помилка завантаження</p>"; }
        }

        async function loadPlayers() {
            try {
                let res = await fetch(API_URL);
                let data = await res.json();
                let html = '<div style="font-size:10px; font-weight:800; color:var(--dim); text-transform:uppercase; margin:20px 0 10px; letter-spacing:2px; text-align:left; width:100%; border-left: 2px solid var(--accent); padding-left:12px;">Гравці у списку:</div>';
                data.filter(p => p.Status === 'ЙДУ').forEach(p => {
                    let ini = p.Name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
                    html += `<div class="rank-item" style="padding: 10px 15px;"><div class="avatar-stub" style="width:32px; height:32px; font-size:10px;">${ini}</div><div class="r-name" style="text-align:left; flex-grow:1;">${p.Name}</div></div>`;
                });
                document.getElementById('list').innerHTML = html || "<p style='text-align:center; padding:20px; opacity:0.5;'>Список порожній</p>";
            } catch(e) { }
        }

        async function joinGame(st) {
            let u = tg.initDataUnsafe.user;
            await fetch(API_URL, { method:'POST', mode:'no-cors', body: JSON.stringify({ ID: String(u?.id || 0), Name: u ? (u.first_name + ' ' + (u.last_name || '')) : "Гість", Status: st, Username: u?.username || "" }) });
            switchTab('game', 1);
        }

        window.onload = () => {
            document.getElementById('indicator').style.transform = `translateX(0%)`;
            loadRanking();
        };
    </script>
</body>
</html>
