<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAFIA PHUKET | EXCLUSIVE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #C1121F;
            --maybe-color: #d4a017;
            --bg: #0a0a0a;
            --card: rgba(20, 20, 20, 0.7);
            --text-main: #ffffff;
            --text-dim: #666;
            --border: rgba(255, 255, 255, 0.1);
        }

        body { 
            font-family: 'Montserrat', sans-serif; 
            background: var(--bg);
            color: var(--text-main); 
            margin: 0; padding: 15px;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("https://www.transparenttextures.com/patterns/stardust.png");
            opacity: 0.03; pointer-events: none; z-index: 9999;
        }

        /* ТАБИ */
        .tabs { 
            display: flex; justify-content: center; position: sticky; top: 0; z-index: 100;
            background: rgba(10,10,10,0.85); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); margin-bottom: 30px;
        }
        .tab-btn { 
            flex: 1; background: none; border: none; color: var(--text-dim); 
            padding: 15px 0; font-size: 11px; font-weight: 800; 
            text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; 
            cursor: pointer;
        }
        .tab-btn.active { color: var(--text-main); border-bottom: 2px solid var(--accent); }
        
        .page { display: none; flex-direction: column; align-items: center; width: 100%; }
        .page.active { display: flex; animation: pageIn 0.5s ease forwards; }

        @keyframes pageIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ГОЛОВНА */
        .splash-img { 
            width: 85%; max-width: 300px; margin: 20px auto 35px;
            border-radius: 12px; border: 1px solid var(--border);
            box-shadow: 0 0 40px rgba(193, 18, 31, 0.2);
        }
        .main-title { font-family: 'Playfair Display', serif; font-size: 42px; margin: 0; letter-spacing: -1px; text-align: center; }
        .main-title span { color: var(--accent); }

        /* П'ЄДЕСТАЛ РЕЙТИНГУ */
        .top-three { display: flex; justify-content: space-around; align-items: flex-end; width: 100%; margin: 20px 0 40px; }
        .podium-item { text-align: center; width: 30%; position: relative; }
        .podium-avatar { 
            width: 50px; height: 50px; background: #111; border: 2px solid var(--border);
            border-radius: 50%; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 20px;
        }
        .place-1 .podium-avatar { width: 75px; height: 75px; border-color: #ffd700; font-size: 35px; box-shadow: 0 0 20px rgba(255, 215, 0, 0.2); }
        .place-2 .podium-avatar { border-color: #c0c0c0; }
        .place-3 .podium-avatar { border-color: #cd7f32; }
        .podium-name { font-size: 12px; font-weight: 600; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .podium-pts { color: var(--accent); font-weight: 800; font-size: 16px; }

        /* СПИСОК ГРАВЦІВ ТА РЕЙТИНГ */
        .rank-list { width: 100%; margin-top: 10px; }
        .rank-item { 
            display: flex; align-items: center; padding: 15px; background: rgba(255,255,255,0.03);
            border-radius: 12px; margin-bottom: 8px; border: 1px solid var(--border);
        }
        .rank-pos { width: 30px; font-size: 10px; font-weight: 800; color: var(--text-dim); }
        .rank-name-box { flex-grow: 1; }
        .rank-name { font-size: 14px; font-weight: 400; }
        .rank-status { font-size: 8px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; display: block; margin-top: 2px; }
        .rank-score { font-weight: 800; color: var(--accent); }

        .btn { 
            width: 100%; padding: 18px 0; border-radius: 10px; border: none; 
            font-weight: 800; font-size: 12px; text-transform: uppercase; 
            letter-spacing: 2px; transition: all 0.3s ease; cursor: pointer;
            margin: 20px 0;
        }
        .btn.go { background: var(--accent); color: white; box-shadow: 0 8px 20px rgba(193, 18, 31, 0.2); }
        
        .avatar-stub { width: 40px; height: 40px; background: #111; border: 1px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; color: var(--text-dim); margin-right: 15px; }
    </style>
</head>
<body>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('splash', 0)">Клуб</button>
        <button class="tab-btn" onclick="switchTab('game', 1)">Гра</button>
        <button class="tab-btn" onclick="switchTab('history', 2)">Рейтинг</button>
    </div>

    <div id="splash-tab" class="page active">
        <img src="mafia.jpg" class="splash-img">
        <h1 class="main-title">MAFIA <span>PHUKET</span></h1>
        <p style="color: var(--text-dim); font-size: 10px; letter-spacing: 5px; text-transform: uppercase; margin: 15px 0 40px;">Елітарний клуб</p>
        <button class="btn go" onclick="switchTab('game', 1)">Почати гру</button>
    </div>

    <div id="game-tab" class="page">
        <button class="btn go" onclick="joinGame('ЙДУ')">Я буду на грі</button>
        <div class="rank-list" id="list">
            <p style="text-align:center; color:var(--text-dim);">Завантаження списку...</p>
        </div>
    </div>

    <div id="history-tab" class="page">
        <div id="leaderboard-content" style="width:100%;">
            <p style="text-align:center; color:var(--text-dim); padding-top:50px;">Оновлюємо рейтинг...</p>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // ТВІЙ НОВИЙ URL СКРИПТА
        const API_URL = "https://script.google.com/macros/s/AKfycbzirzpHztfzNaTDlLmaMbIoodha3ZZvegsxT2TH87ea9H8TcoxSgV8ERW3hNC_1q2-Y6w/exec";

        function switchTab(tabId, index) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId + '-tab').classList.add('active');
            document.querySelectorAll('.tab-btn')[index].classList.add('active');
            
            if(tabId === 'game') loadPlayers();
            if(tabId === 'history') loadRanking();
        }

        async function loadPlayers() {
            const listDiv = document.getElementById('list');
            try {
                let res = await fetch(API_URL);
                let data = await res.json();
                let html = '<div style="font-size:10px; font-weight:800; color:var(--text-dim); text-transform:uppercase; margin:20px 0 10px; letter-spacing:2px;">Гравці на сьогодні:</div>';
                
                data.filter(p => p.Status === 'ЙДУ').forEach(p => {
                    let initials = p.Name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
                    html += `<div class="rank-item">
                                <div class="avatar-stub">${initials}</div>
                                <div class="rank-name">${p.Name}</div>
                             </div>`;
                });
                listDiv.innerHTML = html || "<p style='text-align:center; color:var(--text-dim);'>Поки ніхто не записався</p>";
            } catch (e) { listDiv.innerHTML = "Помилка завантаження списку"; }
        }

        async function loadRanking() {
            const container = document.getElementById('leaderboard-content');
            try {
                let res = await fetch(API_URL + "?action=getRanking");
                let players = await res.json();
                
                // Сортування за очками
                players.sort((a, b) => b.Points - a.Points);

                let html = `
                    <div class="top-three">
                        <div class="podium-item place-2">
                            <div class="podium-avatar">🥈</div>
                            <div class="podium-name">${players[1]?.Name || '-'}</div>
                            <div class="podium-pts">${players[1]?.Points || 0}</div>
                        </div>
                        <div class="podium-item place-1">
                            <div class="podium-avatar">🥇</div>
                            <div class="podium-name">${players[0]?.Name || '-'}</div>
                            <div class="podium-pts">${players[0]?.Points || 0}</div>
                        </div>
                        <div class="podium-item place-3">
                            <div class="podium-avatar">🥉</div>
                            <div class="podium-name">${players[2]?.Name || '-'}</div>
                            <div class="podium-pts">${players[2]?.Points || 0}</div>
                        </div>
                    </div>
                    <div class="rank-list">`;

                players.slice(3).forEach((p, i) => {
                    html += `
                        <div class="rank-item">
                            <div class="rank-pos">${i + 4}</div>
                            <div class="rank-name-box">
                                <span class="rank-name">${p.Name}</span>
                                <span class="rank-status">${p.Status || ''}</span>
                            </div>
                            <div class="rank-score">${p.Points}</div>
                        </div>`;
                });
                container.innerHTML = html + "</div>";
            } catch (e) { container.innerHTML = "Помилка завантаження рейтингу"; }
        }

        async function joinGame(status) {
            let user = tg.initDataUnsafe.user;
            await fetch(API_URL, {
                method: 'POST', mode: 'no-cors',
                body: JSON.stringify({
                    ID: String(user?.id || Date.now()),
                    Name: user ? (user.first_name + " " + (user.last_name || "")) : "Гість",
                    Status: status,
                    Username: user?.username || ""
                })
            });
            switchTab('game', 1);
        }

        window.onload = () => loadRanking();
    </script>
</body>
</html>
