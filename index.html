<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAFIA PHUKET</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #0f0f0f; color: #ffffff; text-align: center; margin: 0; padding: 10px; }
        
        /* Навігація */
        .tabs { display: flex; justify-content: center; margin-bottom: 20px; border-bottom: 1px solid #333; }
        .tab-btn { background: none; border: none; color: #888; padding: 12px 20px; cursor: pointer; font-size: 14px; font-weight: 600; text-transform: uppercase; transition: 0.3s; }
        .tab-btn.active { color: #e74c3c; border-bottom: 2px solid #e74c3c; }

        /* Головний екран */
        .splash-screen { padding: 20px 0; }
        .splash-img { width: 90%; max-width: 350px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); border: 1px solid #333; }
        .main-title { font-size: 28px; font-weight: 800; margin: 20px 0 10px; letter-spacing: 1px; }
        .main-title span { color: #e74c3c; }
        .sub-text { color: #aaa; font-size: 14px; margin-bottom: 25px; }

        /* Картка гри */
        .game-card { background: #1a1a1a; border-radius: 15px; padding: 20px; margin-bottom: 20px; border: 1px solid #333; text-align: left; }
        .game-card h2 { margin: 0 0 10px 0; font-size: 20px; color: #e74c3c; }
        .info-row { display: flex; align-items: center; margin: 5px 0; font-size: 15px; color: #ddd; }

        /* Кнопки */
        .btn-group { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 20px; }
        .btn { flex: 1; padding: 14px 0; border-radius: 10px; border: none; cursor: pointer; font-weight: 700; font-size: 13px; text-transform: uppercase; transition: 0.2s; }
        .go { background: #27ae60; color: white; }
        .maybe { background: #f1c40f; color: #000; }
        .no { background: #c0392b; color: white; }
        .btn:active { transform: scale(0.96); }

        /* Список гравців */
        .player-list { text-align: left; background: #1a1a1a; padding: 15px; border-radius: 15px; border: 1px solid #333; }
        .list-header { color: #e74c3c; font-weight: 700; font-size: 16px; margin-bottom: 12px; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 8px; }
        .player-item { padding: 10px 0; border-bottom: 1px solid #2a2a2a; display: flex; justify-content: space-between; align-items: center; }
        .player-item a { color: #3498db; text-decoration: none; }
        .status-badge { font-size: 11px; padding: 3px 8px; border-radius: 5px; font-weight: 700; border: 1px solid rgba(255,255,255,0.1); }

        /* Історія */
        .history-item { text-align: left; padding: 12px; border-radius: 10px; margin-bottom: 10px; background: #1a1a1a; border: 1px solid #333; font-size: 14px; }
        .win-tag { color: #2ecc71; font-weight: bold; }
        .loss-tag { color: #e74c3c; font-weight: bold; }
    </style>
</head>
<body>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('splash')">Головна</button>
        <button class="tab-btn" onclick="switchTab('game')">Запис</button>
        <button class="tab-btn" onclick="switchTab('history')">Статистика</button>
    </div>

    <div id="splash-tab" class="splash-screen">
        <img src="mafia.jpg" class="splash-img">
        <h1 class="main-title">MAFIA <span>PHUKET</span></h1>
        <p class="sub-text">Клуб інтелектуально-психологічної гри</p>
        <button class="btn go" style="width: 100%; max-width: 300px;" onclick="switchTab('game')">Перейти до запису</button>
    </div>

    <div id="game-tab" style="display:none;">
        <div class="game-card">
            <h2>Наступна гра</h2>
            <div class="info-row">📅 Субота, 19:30</div>
            <div class="info-row">📍 Ali BBQ Kathu</div>
            <div class="info-row">💵 Внесок: 100 THB</div>
        </div>
        
        <div class="btn-group">
            <button class="btn go" onclick="joinGame('ЙДУ')">Буду</button>
            <button class="btn maybe" onclick="joinGame('ДУМАЮ')">Думаю</button>
            <button class="btn no" onclick="joinGame('НІ')">Не буду</button>
        </div>

        <div class="player-list">
            <div class="list-header">Записані гравці:</div>
            <div id="list">Завантаження...</div>
        </div>
    </div>

    <div id="history-tab" style="display:none;">
        <div id="history-list">Завантаження даних...</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let API_URL = "https://sheetdb.io/api/v1/pwmmhu038mp22";

        function switchTab(tab) {
            document.getElementById('splash-tab').style.display = tab === 'splash' ? 'block' : 'none';
            document.getElementById('game-tab').style.display = tab === 'game' ? 'block' : 'none';
            document.getElementById('history-tab').style.display = tab === 'history' ? 'block' : 'none';
            
            document.querySelectorAll('.tab-btn').forEach((btn, idx) => {
                btn.classList.remove('active');
                if ((tab === 'splash' && idx === 0) || (tab === 'game' && idx === 1) || (tab === 'history' && idx === 2)) {
                    btn.classList.add('active');
                }
            });

            if(tab === 'game') loadPlayers();
            if(tab === 'history') loadHistory();
        }

        async function joinGame(status) {
            let user = tg.initDataUnsafe.user;
            let name = user ? (user.first_name + " " + (user.last_name || "")) : "Гість";
            let username = user?.username || "";
            let id = String(user?.id || Date.now());

            await fetch(`${API_URL}/ID/${id}`, { method: 'DELETE' });
            if (status !== 'НІ') {
                await fetch(API_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ data: [{"ID": id, "Name": name, "Status": status, "Username": username}] })
                });
            }
            loadPlayers();
        }

        async function loadPlayers() {
            let res = await fetch(API_URL);
            let data = await res.json();
            let list = document.getElementById('list');
            list.innerHTML = "";
            
            let active = data.filter(p => p.Status !== 'НІ');
            if (active.length === 0) { list.innerHTML = "Списку поки немає"; return; }

            active.forEach((p, i) => {
                let link = p.Username ? `https://t.me/${p.Username}` : "#";
                let color = p.Status === 'ЙДУ' ? '#2ecc71' : '#f1c40f';
                if(i === 15) list.innerHTML += "<div style='color:#555; text-align:center; padding:10px;'>——— РЕЗЕРВ ———</div>";
                list.innerHTML += `<div class="player-item">
                    <span>${i+1}. <a href="${link}" target="_blank">${p.Name}</a></span>
                    <span class="status-badge" style="color:${color}; border-color:${color}">${p.Status}</span>
                </div>`;
            });
        }

        async function loadHistory() {
            let res = await fetch(API_URL + "?sheet=History");
            let data = await res.json();
            let hist = document.getElementById('history-list');
            hist.innerHTML = "";
            if (data.length === 0) { hist.innerHTML = "Історія ігор порожня"; return; }

            data.reverse().forEach(h => {
                let isWin = h.Result?.toLowerCase() === 'win';
                let resText = isWin ? 'ПЕРЕМОГА' : 'ПОРАЗКА';
                let resClass = isWin ? 'win-tag' : 'loss-tag';
                hist.innerHTML += `<div class="history-item">
                    <span style="color:#888; font-size:11px;">${h.Date}</span><br>
                    <b>${h.Player_Name}</b> (${h.Role}) — <span class="${resClass}">${resText}</span>
                </div>`;
            });
        }
    </script>
</body>
</html>
