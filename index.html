<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mafia Phuket</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: white; text-align: center; margin: 0; padding: 20px; }
        .card { background: #1e1e1e; border: 1px solid #333; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h1 { color: #e74c3c; text-transform: uppercase; letter-spacing: 2px; }
        .btn { padding: 12px 20px; margin: 5px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; width: 80%; max-width: 300px; transition: 0.3s; }
        .go { background: #2ecc71; color: white; }
        .maybe { background: #f1c40f; color: #000; }
        .no { background: #e74c3c; color: white; }
        .btn:active { transform: scale(0.95); }
        .divider { border-top: 2px dashed #555; margin: 20px 0; padding-top: 10px; color: #888; font-weight: bold; }
        .player-list { text-align: left; max-width: 350px; margin: 20px auto; background: #1e1e1e; padding: 15px; border-radius: 10px; }
        .player-item { padding: 8px 0; border-bottom: 1px solid #333; display: flex; justify-content: space-between; }
        .status-tag { font-size: 0.8em; padding: 2px 6px; border-radius: 4px; border: 1px solid #444; }
    </style>
</head>
<body>

    <div id="main-screen">
        <div style="font-size: 50px;">🎭</div>
        <h1>Mafia Phuket</h1>
        <p>Клуб інтелектуальної гри</p>
        <button class="btn go" onclick="showGame()">Увійти до запису</button>
    </div>

    <div id="game-screen" style="display:none;">
        <div class="card">
            <h2>Субота, 19:00</h2>
            <p>📍 Локація: Rawai</p>
            <p>💰 Внесок: 500 THB</p>
        </div>
        
        <button class="btn go" onclick="joinGame('Йду')">✅ Я буду</button>
        <button class="btn maybe" onclick="joinGame('Думаю')">🤔 Не впевнений</button>
        <button class="btn no" onclick="joinGame('Не буду')">❌ Не зможу</button>

        <h3>Список учасників:</h3>
        <div class="player-list" id="list">
            Завантаження списку...
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        let API_URL = "https://sheetdb.io/api/v1/pwmmhu038mp22";

        function showGame() {
            document.getElementById('main-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            loadPlayers();
        }

        async function joinGame(status) {
            let user = tg.initDataUnsafe.user;
            let name = user ? user.first_name + (user.last_name ? " " + user.last_name : "") : "Гравець";
            let id = String(user ? user.id : "ID-" + Math.floor(Math.random() * 1000));

            document.getElementById('list').innerText = "Обробка запису...";

            try {
                // 1. Отримуємо поточний список, щоб знайти гравця за ID
                let response = await fetch(API_URL);
                let players = await response.json();
                let existingPlayer = players.find(p => String(p.ID) === id);

                if (existingPlayer) {
                    // 2. Якщо гравець є - оновлюємо його статус (PATCH)
                    await fetch(`${API_URL}/ID/${id}`, {
                        method: 'PATCH',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ "Status": status, "Timestamp": new Date().toLocaleString('uk-UA') })
                    });
                } else {
                    // 3. Якщо немає - створюємо новий запис (POST)
                    let data = {
                        "ID": id,
                        "Name": name,
                        "Status": status,
                        "Timestamp": new Date().toLocaleString('uk-UA')
                    };
                    await fetch(API_URL, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ data: [data] })
                    });
                }
            } catch (error) {
                console.error("Помилка при записі:", error);
            }

            loadPlayers();
        }

        async function loadPlayers() {
            try {
                let response = await fetch(API_URL);
                let players = await response.json();
                
                // Фільтруємо тих, хто відмовився, і сортуємо за часом запису
                let activePlayers = players.filter(p => p.Status !== "Не буду");
                let listDiv = document
