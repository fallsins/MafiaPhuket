<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAFIA PHUKET | PRIVATE SOCIETY</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #C1121F;
            --maybe-color: #d4a017;
            --bg: #0a0a0a;
            --card: rgba(20, 20, 20, 0.7); /* Напівпрозорий для скла */
            --text-main: #ffffff;
            --text-dim: #666;
            --border: rgba(255, 255, 255, 0.1);
        }

        body { 
            font-family: 'Montserrat', sans-serif; 
            background: var(--bg);
            color: var(--text-main); 
            margin: 0; padding: 15px;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* --- GRAIN OVERLAY (Ефект преміальної текстури) --- */
        body::before {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("https://www.transparenttextures.com/patterns/stardust.png");
            opacity: 0.03; pointer-events: none; z-index: 9999;
        }

        /* ТАБИ */
        .tabs { 
            display: flex; justify-content: center; position: sticky; top: 0; z-index: 100;
            background: rgba(10,10,10,0.8); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); margin-bottom: 30px;
        }
        .tab-btn { 
            flex: 1; background: none; border: none; color: var(--text-dim); 
            padding: 15px 0; font-size: 11px; font-weight: 800; 
            text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; 
        }
        .tab-btn.active { color: var(--text-main); }
        .tab-indicator {
            position: absolute; bottom: 0; left: 0; height: 2px; width: 33.333%;
            background: var(--accent); transition: transform 0.4s cubic-bezier(0.65, 0, 0.35, 1);
            box-shadow: 0 0 15px var(--accent);
        }

        /* СТОРІНКИ */
        .page {
            display: none; flex-direction: column; align-items: center;
            width: 100%; text-align: center;
        }
        .page.active { display: flex; animation: pageIn 0.5s ease forwards; }

        @keyframes pageIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ГОЛОВНА */
        .splash-img { 
            width: 85%; max-width: 300px; margin: 20px auto 35px;
            border-radius: 12px; border: 1px solid var(--border);
            box-shadow: 0 0 40px rgba(193, 18, 31, 0.2);
            animation: glow 4s infinite alternate;
        }
        @keyframes glow {
            from { box-shadow: 0 0 20px rgba(193, 18, 31, 0.1); }
            to { box-shadow: 0 0 50px rgba(193, 18, 31, 0.3); }
        }
        .main-title { font-family: 'Playfair Display', serif; font-size: 42px; margin: 0; letter-spacing: -1px; }
        .main-title span { color: var(--accent); }

        /* КАРТКА ГРИ (Glassmorphism) */
        .game-card { 
            background: var(--card); backdrop-filter: blur(15px);
            border-radius: 16px; padding: 25px; 
            margin-bottom: 25px; border: 1px solid var(--border); 
            text-align: left; width: 100%; box-sizing: border-box;
        }
        .info-label { font-size: 9px; color: var(--accent); font-weight: 800; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; }
        .info-value { font-size: 16px; font-weight: 400; color: #eee; }

        /* КНОПКИ */
        .btn-group { display: flex; flex-direction: column; gap: 12px; width: 100%; }
        .btn { 
            width: 100%; padding: 18px 0; border-radius: 10px; border: none; 
            font-weight: 800; font-size: 12px; text-transform: uppercase; 
            letter-spacing: 2px; transition: all 0.3s ease; cursor: pointer;
        }
        .btn.go { background: var(--accent); color: white; box-shadow: 0 8px 20px rgba(193, 18, 31, 0.2); }
        .btn.maybe { background: transparent; border: 1px solid #333; color: #aaa; }
        .btn.no { background: transparent; color: #444; font-size: 10px; margin-top: 5px; letter-spacing: 3px; }
        .btn:active { transform: scale(0.96); }

        /* СПИСОК ГРАВЦІВ */
        .player-list { text-align: left; width: 100%; margin-top: 20px; }
        .list-section-title {
            font-size: 10px; font-weight: 800; color: var(--text-dim);
            text-transform: uppercase; letter-spacing: 2px;
            margin: 30px 0 15px; border-left: 2px solid var(--accent); padding-left: 12px;
        }
        
        .player-item { 
            padding: 15px 0; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 15px;
            opacity: 0; animation: itemIn 0.4s ease forwards;
        }

        @keyframes itemIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .avatar-stub {
            width: 40px; height: 40px; 
            background: linear-gradient(135deg, #1a1a1a 0%, #050505 100%);
            border: 1px solid var(--border); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: 800; color: var(--text-dim);
        }
        .status-confirmed .avatar-stub { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 10px rgba(193, 18, 31, 0.2); }
        .status-maybe .avatar-stub { border-color: var(--maybe-color); color: var(--maybe-color); }
        .player-name { font-weight: 400; font-size: 15px; flex-grow: 1; letter-spacing: 0.3px; }
        .player-name a { color: inherit; text-decoration: none; }
    </style>
</head>
<body>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('splash', 0)">Клуб</button>
        <button class="tab-btn" onclick="switchTab('game', 1)">Гра</button>
        <button class="tab-btn" onclick="switchTab('history', 2)">Рейтинг</button>
        <div class="tab-indicator" id="indicator"></div>
    </div>

    <div id="splash-tab" class="page active">
        <img src="mafia.jpg" class="splash-img">
        <h1 class="main-title">MAFIA <span>PHUKET</span></h1>
        <p style="color: var(--text-dim); font-size: 10px; letter-spacing: 5px; text-transform: uppercase; margin: 15px 0 40px;">Private Game Society</p>
        <button class="btn go" onclick="switchTab('game', 1)">Долучитись до гри</button>
    </div>

    <div id="game-tab" class="page">
        <div class="game-card">
            <div style="margin-bottom:20px;">
                <div class="info-label">Time</div>
                <div class="info-value">Saturday · 19:30</div>
            </div>
            <div style="margin-bottom:20px;">
                <div class="info-label">Location</div>
                <div class="info-value">Ali BBQ Kathu</div>
            </div>
            <div>
                <div class="info-label">Buy-in</div>
                <div class="info-value">100 THB</div>
            </div>
        </div>
        
        <div class="btn-group">
            <button class="btn go" onclick="joinGame('ЙДУ')">Приєднатись</button>
            <button class="btn maybe" onclick="joinGame('ДУМАЮ')">Не впевнений</button>
            <button class="btn no" onclick="joinGame('НІ')">Відмовитись</button>
        </div>

        <div class="player-list" id="list">
            </div>
    </div>

    <div id="history-tab" class="page">
        <div style="padding: 100px 0; color: var(--text-dim); font-size: 10px; letter-spacing: 4px; text-transform: uppercase;">Рейтинг сезону <br><span style="color:var(--accent)">Незабаром</span></div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        const API_URL = "https://script.google.com/macros/s/AKfycbx78BBZhgPFEvWa1Nec7wItEEFAWtI8m6G4yCH8DY6oZAnGyGXfOw54LY8CdK09Z36nig/exec";

        function switchTab(tabId, index) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId + '-tab').classList.add('active');
            document.querySelectorAll('.tab-btn')[index].classList.add('active');
            document.getElementById('indicator').style.transform = `translateX(${index * 100}%)`;
            if(tabId === 'game') loadPlayers();
        }

        async function joinGame(status) {
            let user = tg.initDataUnsafe.user;
            await fetch(API_URL, {
                method: 'POST', mode: 'no-cors',
                body: JSON.stringify({
                    ID: String(user?.id || Date.now()),
                    Name: user ? (user.first_name + " " + (user.last_name || "")) : "Гість",
                    Status: status,
                    Username: user?.username ? "@" + user.username : ""
                })
            });
            setTimeout(loadPlayers, 500);
        }

        async function loadPlayers() {
            try {
                let res = await fetch(API_URL);
                let data = await res.json();
                let list = document.getElementById('list');
                let going = data.filter(p => p.Status === 'ЙДУ');
                let maybe = data.filter(p => p.Status === 'ДУМАЮ');
                
                let html = `<div style="display:flex; justify-content:space-between; font-size:11px; font-weight:800; color:var(--text-dim); text-transform:uppercase; letter-spacing:2px; margin-bottom:20px;">
                                <span>Players</span>
                                <span style="color:var(--accent)">${going.length} / 15</span>
                            </div>`;

                if (going.length > 0) {
                    html += `<div class="list-section-title">Confirmed</div>`;
                    going.forEach((p, i) => {
                        let initials = p.Name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
                        html += `<div class="player-item status-confirmed" style="animation-delay: ${i * 0.05}s">
                                    <div class="avatar-stub">${initials}</div>
                                    <div class="player-name"><a onclick="tg.openTelegramLink('https://t.me/${p.Username.replace('@','')}')">${p.Name}</a></div>
                                 </div>`;
                    });
                }

                if (maybe.length > 0) {
                    html += `<div class="list-section-title" style="border-color:var(--maybe-color)">Pending</div>`;
                    maybe.forEach((p, i) => {
                        let initials = p.Name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
                        html += `<div class="player-item status-maybe" style="animation-delay: ${(going.length + i) * 0.05}s">
                                    <div class="avatar-stub">${initials}</div>
                                    <div class="player-name"><a>${p.Name}</a></div>
                                 </div>`;
                    });
                }

                list.innerHTML = html || "<div style='color:#444; padding:20px;'>Список порожній</div>";
            } catch (e) { list.innerHTML = "Error loading..."; }
        }
        window.onload = () => document.getElementById('indicator').style.transform = `translateX(0%)`;
    </script>
</body>
</html>
