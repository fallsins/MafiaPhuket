<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAFIA PHUKET / GANG WAR</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Підключаємо крутий шрифт Mafia для заголовка */
        @font-face {
            font-family: 'MafiaFont';
            src: url('https://fonts.cdnfonts.com/s/17223/mafia.woff') format('woff');
        }

        body { font-family: 'Segoe UI', sans-serif; background: #080808; color: #fff; text-align: center; margin: 0; padding: 10px; }
        .tabs { display: flex; justify-content: center; margin-bottom: 20px; border-bottom: 2px solid #333; }
        .tab-btn { background: none; border: none; color: #777; padding: 12px 25px; cursor: pointer; font-size: 14px; text-transform: uppercase; font-weight: bold; }
        .tab-btn.active { color: #e74c3c; border-bottom: 3px solid #e74c3c; }

        .splash-screen { padding: 40px 0; }
        .splash-img { width: 100%; max-width: 320px; border-radius: 20px; border: 3px solid #e74c3c; box-shadow: 0 0 30px rgba(231, 76, 60, 0.4); }
        .main-title { font-family: 'MafiaFont', sans-serif; font-size: 36px; color: #e74c3c; margin: 15px 0; letter-spacing: 3px; }
        .main-title span { color: #fff; }

        .game-card { background: #1a1a1a; border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid #333; }
        h2 { font-size: 24px; color: #fff; margin: 10px 0; }
        h2 span { color: #e74c3c; }

        .btn { padding: 14px; margin: 8px 4px; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; width: 30%; font-size: 14px; text-transform: uppercase; transition: 0.3s; }
        .go { background: #2ecc71; color: white; }
        .maybe { background: #f1c40f; color: #000; }
        .no { background: #e74c3c; color: white; }
        .go:hover { box-shadow: 0 0 20px rgba(46, 204, 113, 0.6); }

        .player-list { text-align: left; background: #1a1a1a; padding: 15px; border-radius: 15px; border: 1px solid #333; margin-top: 15px; }
        .list-header { color: #e74c3c; font-weight: bold; font-size: 18px; border-bottom: 2px solid #333; padding-bottom: 8px; margin-bottom: 8px; }
        .player-item { padding: 12px 0; border-bottom: 1px solid #2a2a2a; display: flex; justify-content: space-between; font-size: 14px; }
        .player-item a { color: #3498db; text-decoration: none; font-weight: 500; }
        .player-item a:hover { color: #fff; }

        .history-item { text-align: left; padding: 12px; border: 1px solid #2a2a2a; border-radius: 10px; margin-bottom: 10px; font-size: 13px; background: #1a1a1a; }
        .hist-date { color: #e74c3c; font-weight: bold; }
        .win { color: #2ecc71; font-weight: bold; } .loss { color: #e74c3c; font-weight: bold; }
    </style>
</head>
<body>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('splash')">Зайти</button>
        <button class="tab-btn" onclick="switchTab('game')">Запис</button>
        <button class="tab-btn" onclick="switchTab('history')">Стата</button>
    </div>

    <div id="splash-tab" class="splash-screen">
        <img src="mafia.jpg" class="splash-img" alt="MAFIA">
        <h1 class="main-title">MAFIA <span>PHUKET</span></h1>
        <p>Клуб інтелектуального «кілерства».</p>
        <p>Вхід тільки для своїх.</p>
        <button class="btn go" onclick="switchTab('game')">Перейти до запису</button>
    </div>

    <div id="game-tab" style="display:none;">
        <div class="game-card">
            <h2>GANG WAR / <span>СУБОТА</span></h2>
            <p>Час: 19:30 | Місце: Ali BBQ Kathu</p>
            <p>Вхідний квиток: 100 THB</p>
        </div>
        <div style="display: flex; justify-content: center;">
            <button class="btn go" onclick="joinGame('ЙДУ')">Я БУДУ</button>
            <button class="btn maybe" onclick="joinGame('ДУМАЮ')">ДУМАЮ</button>
            <button class="btn no" onclick="joinGame('НІ')">НЕ МОЖУ</button>
        </div>
        <div class="player-list">
            <div class="list-header">УЧАСНИКИ GANG WAR:</div>
            <div id="list">Завантаження...</div>
        </div>
    </div>

    <div id="history-tab" style="display:none;">
        <div id="history-list">Завантаження статистики...</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let API_URL = "https://sheetdb.io/api/v1/pwmmhu038mp22";

        function switchTab(tab) {
            document.getElementById('splash-tab').style.display = tab === 'splash' ? 'block' : 'none';
            document.getElementById('game-tab').style.display = tab === 'game' ? 'block' : 'none';
            document.getElementById('history-tab').style.display = tab === 'history' ? 'block' : 'none';
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            if(tab === 'splash') document.querySelectorAll('.tab-btn')[0].classList.add('active');
            if(tab === 'game') { document.querySelectorAll('.tab-btn')[1].classList.add('active'); loadPlayers(); }
            if(tab === 'history') { document.querySelectorAll('.tab-btn')[2].classList.add('active'); loadHistory(); }
        }

        async function joinGame(status) {
            let user = tg.initDataUnsafe.user;
            let name = user ? (user.first_name + " " + (user.last_name || "")) : "Тестовий Гравець";
            let username = user?.username || "";
            let id = String(user?.id || "12345");

            // Перезапис: видаляємо і створюємо новий рядок (простіше для рейтингу)
            await fetch(`${API_URL}/ID/${id}`, { method: 'DELETE' });
            if (status !== 'НІ') {
                await fetch(API_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ data: [{"ID": id, "Name": name, "Status": status, "Username": username}] })
                });
            }
            loadPlayers();
        }

        async function loadPlayers() {
            let res = await fetch(API_URL);
            let data = await res.json();
            let list = document.getElementById('list');
            list.innerHTML = "";
            data.filter(p => p.Status !== 'НІ').forEach((p, i) => {
                let link = p.Username ? `https://t.me/${p.Username}` : "#";
                let statusColor = p.Status === 'ЙДУ' ? '#2ecc71' : '#f1c40f';
                list.innerHTML += `<div class="player-item"><span>${i+1}. <a href="${link}" target="_blank">${p.Name}</a></span> <span style="color:${statusColor}">${p.Status}</span></div>`;
            });
        }

        async function loadHistory() {
            let res = await fetch(API_URL + "?sheet=History");
            let data = await res.json();
            let hist = document.getElementById('history-list');
            hist.innerHTML = "";
            data.reverse().forEach(h => {
                let resClass = h.Result === 'Win' ? 'win' : 'loss';
                hist.innerHTML += `<div class="history-item"><span class="hist-date">${h.Date}</span>: ${h.Player_Name} (${h.Role}) — <span class="${resClass}">${h.Result}</span></div>`;
            });
        }
    </script>
</body>
</html>
