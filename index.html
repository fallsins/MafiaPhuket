<style>
    /* ... (попередні стилі залишаються) ... */

    .list-section-title {
        font-size: 10px;
        font-weight: 800;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 2px;
        margin: 25px 0 15px;
        display: flex;
        justify-content: space-between;
        border-left: 2px solid var(--border);
        padding-left: 10px;
    }

    /* Стиль для тих, хто підтвердив */
    .status-confirmed .avatar-stub {
        background: linear-gradient(135deg, #222 0%, #111 100%);
        border-color: var(--accent);
        color: var(--accent);
    }

    /* Стиль для тих, хто думає */
    .status-maybe {
        opacity: 0.7;
    }
    .status-maybe .avatar-stub {
        background: linear-gradient(135deg, #222 0%, #111 100%);
        border-color: #d4a017; /* Золотистий/Бурштиновий */
        color: #d4a017;
    }
    .status-maybe .player-name {
        color: #999;
    }
</style>

<script>
    // ... (початок скрипта той самий) ...

    async function loadPlayers() {
        try {
            let res = await fetch(API_URL);
            let data = await res.json();
            let list = document.getElementById('list');
            
            // Фільтруємо групи
            let going = data.filter(p => p.Status === 'ЙДУ');
            let thinking = data.filter(p => p.Status === 'ДУМАЮ');
            
            document.getElementById('seats-info').innerText = going.length + " / 15";
            
            let html = "";

            // Секція 1: Ті, хто йдуть
            if (going.length > 0) {
                html += `<div class="list-section-title">Підтвердили <span>${going.length}</span></div>`;
                going.forEach(p => {
                    let initials = p.Name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
                    html += `
                        <div class="player-item status-confirmed">
                            <div class="avatar-stub">${initials}</div>
                            <div class="player-name"><a onclick="tg.openTelegramLink('https://t.me/${p.Username.replace('@','')}')">${p.Name}</a></div>
                        </div>`;
                });
            }

            // Секція 2: Ті, хто думають
            if (thinking.length > 0) {
                html += `<div class="list-section-title" style="border-color: #d4a017; color: #d4a017;">Можливо <span>${thinking.length}</span></div>`;
                thinking.forEach(p => {
                    let initials = p.Name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
                    html += `
                        <div class="player-item status-maybe">
                            <div class="avatar-stub">${initials}</div>
                            <div class="player-name"><a onclick="tg.openTelegramLink('https://t.me/${p.Username.replace('@','')}')">${p.Name}</a></div>
                        </div>`;
                });
            }

            if (html === "") html = "<div style='padding:40px; color:#444;'>Поки ніхто не записався</div>";
            list.innerHTML = html;

        } catch (e) { 
            console.error(e);
            list.innerHTML = "<div style='color:var(--accent); font-size:10px;'>ПОМИЛКА ЗАВАНТАЖЕННЯ</div>"; 
        }
    }
</script>
