<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAFIA PHUKET | PRIVATE SOCIETY</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #C1121F;
            --maybe-color: #d4a017; /* Золотистий для тих, хто думає */
            --bg: #0a0a0a;
            --card: #141414;
            --text-main: #ffffff;
            --text-dim: #666;
            --border: #222;
        }

        body { 
            font-family: 'Montserrat', sans-serif; 
            background: var(--bg);
            color: var(--text-main); 
            margin: 0; padding: 15px;
            -webkit-font-smoothing: antialiased;
            background-image: url("https://www.transparenttextures.com/patterns/carbon-fibre.png");
        }

        /* ТАБИ */
        .tabs { 
            display: flex; justify-content: center; position: sticky; top: 0; z-index: 100;
            background: rgba(10,10,10,0.85); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border); margin-bottom: 30px;
            position: relative;
        }
        .tab-btn { 
            flex: 1; background: none; border: none; color: var(--text-dim); 
            padding: 15px 0; font-size: 11px; font-weight: 800; 
            text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; 
            cursor: pointer;
        }
        .tab-btn.active { color: var(--text-main); }
        .tab-indicator {
            position: absolute; bottom: 0; left: 0; height: 2px; width: 33.333%;
            background: var(--accent); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 10px var(--accent);
        }

        /* СТОРІНКИ */
        .page {
            display: none; flex-direction: column; align-items: center;
            opacity: 0; transform: translateY(10px); transition: all 0.3s ease;
            width: 100%; text-align: center;
        }
        .page.active { display: flex; opacity: 1; transform: translateY(0); }

        /* ГОЛОВНА */
        .splash-screen { padding-top: 20px; }
        .splash-img { 
            display: block; width: 85%; max-width: 300px; margin: 0 auto 35px;
            border-radius: 12px; border: 1px solid var(--border);
            box-shadow: 0 0 0 1px var(--border), 0 0 30px rgba(193, 18, 31, 0.2), 0 0 60px rgba(193, 18, 31, 0.1);
        }
        .main-title { font-family: 'Playfair Display', serif; font-size: 42px; margin: 0; letter-spacing: -1px; line-height: 1.1; }
        .main-title span { color: var(--accent); }
        .sub-text { color: var(--text-dim); font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 4px; margin: 15px 0 45px; }

        /* КАРТКА ГРИ */
        .game-card { 
            background: var(--card); border-radius: 12px; padding: 25px; 
            margin-bottom: 25px; border: 1px solid var(--border); text-align: left; width: 100%; box-sizing: border-box;
        }
        .info-block { margin-bottom: 20px; }
        .info-label { font-size: 9px; color: var(--accent); font-weight: 800; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; }
        .info-value { font-size: 16px; font-weight: 400; color: #eee; }

        /* КНОПКИ */
        .btn-group { display: flex; flex-direction: column; gap: 12px; width: 100%; margin-bottom: 30px; }
        .btn { 
            width: 100%; padding: 18px 0; border-radius: 8px; border: none; 
            font-weight: 800; font-size: 12px; text-transform: uppercase; 
            letter-spacing: 2px; transition: all 0.2s ease; cursor: pointer;
        }
        .btn.go { background: var(--accent); color: white; box-shadow: 0 4px 15px rgba(193, 18, 31, 0.3); }
        .btn.maybe { background: transparent; border: 1px solid #333; color: #aaa; }
        .btn.no { background: transparent; border: 1px solid transparent; color: #555; font-size: 10px; margin-top: 5px; opacity: 0.7; letter-spacing: 3px; }
        .btn:active { transform: scale(0.97); }

        /* СПИСОК ГРАВЦІВ */
        .player-list { text-align: left; width: 100%; margin-top: 20px; }
        .list-header { 
            display: flex; justify-content: space-between; align-items: center;
            font-size: 11px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px;
        }
        .list-section-title {
            font-size: 10px; font-weight: 800; color: var(--text-dim);
            text-transform: uppercase; letter-spacing: 2px;
            margin: 25px 0 10px; display: flex; justify-content: space-between;
            border-left: 2px solid var(--border); padding-left: 10px;
        }
        .seats-count { color: var(--accent); }
        
        .player-item { 
            padding: 12px 0; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 15px;
            transition: opacity 0.3s ease;
        }
        .avatar-stub {
            width: 38px; height: 38px; 
            background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%);
            border: 1px solid var(--border); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: 800; color: var(--text-dim);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* Стилі для різних статусів у списку */
        .status-confirmed .avatar-stub { border-color: var(--accent); color: var(--accent); }
        .status-maybe { opacity: 0.7; }
        .status-maybe .avatar-stub { border-color: var(--maybe-color); color: var(--maybe-color); }
        .status-maybe .player-name { color: #999; }

        .player-name { font-weight: 400; font-size: 15px; flex-grow: 1; }
        .player-name a { color: inherit; text-decoration: none; cursor: pointer; }
    </style>
</head>
<body>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('splash', 0)">Клуб</button>
        <button class="tab-btn" onclick="switchTab('game', 1)">Гра</button>
        <button class="tab-btn" onclick="switchTab('history', 2)">Рейтинг</button>
        <div class="tab-indicator" id="indicator"></div>
    </div>

    <div id="splash-tab" class="page active">
        <div class="splash-screen">
            <img src="mafia.jpg" class="splash-img">
            <h1 class="main-title">MAFIA <span>PHUKET</span></h1>
            <p class="sub-text">Інтелектуально-соціальна гра</p>
            <button class="btn go" onclick="switchTab('game', 1)">Долучитись до гри</button>
        </div>
    </div>

    <div id="game-tab" class="page">
        <div class="game-card">
            <div class="info-block">
                <div class="info-label">Час</div>
                <div class="info-value">Субота · 19:30</div>
            </div>
            <div class="info-block">
                <div class="info-label">Локація</div>
                <div class="info-value">Ali BBQ Kathu</div>
            </div>
            <div class="info-block">
                <div class="info-label">Внесок</div>
                <div class="info-value">100 THB</div>
            </div>
        </div>
        
        <div class="btn-group">
            <button class="btn go" onclick="joinGame('ЙДУ')">Приєднатись</button>
            <button class="btn maybe" onclick="joinGame('ДУМАЮ')">Не впевнений</button>
            <button class="btn no" onclick="joinGame('НІ')">Відмовитись</button>
        </div>

        <div class="player-list">
            <div class="list-header">
                <span>Гравці</span>
                <span class="seats-count" id="seats-info">0 / 15</span>
            </div>
            <div id="list">Завантаження...</div>
        </div>
    </div>

    <div id="history-tab" class="page">
        <div style="padding: 60px 20px; color: var(--text-dim); font-size: 10px; letter-spacing: 3px; text-transform: uppercase;">
            Рейтинг сезону <br><span style="color: var(--accent); margin-top: 10px; display: block;">Незабаром</span>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        const API_URL = "https://script.google.com/macros/s/AKfycbx78BBZhgPFEvWa1Nec7wItEEFAWtI8m6G4yCH8DY6oZAnGyGXfOw54LY8CdK09Z36nig/exec";

        function switchTab(tabId, index) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId + '-tab').classList.add('active');
            document.querySelectorAll('.tab-btn')[index].classList.add('active');
            document.getElementById('indicator').style.transform = `translateX(${index * 100}%)`;
            if(tabId === 'game') loadPlayers();
        }

        async function joinGame(status) {
            let user = tg.initDataUnsafe.user;
            let name = user ? (user.first_name + " " + (user.last_name || "")) : "Гість";
            let username = user?.username ? "@" + user.username : ""; 
            
            // Локальне оновлення для швидкості
            document.getElementById('list').innerHTML = "<div style='opacity:0.5; padding:20px; font-size:10px; letter-spacing:1px;'>ОНОВЛЕННЯ СТАТУСУ...</div>";

            await fetch(API_URL, {
                method: 'POST', mode: 'no-cors',
                body: JSON.stringify({"ID": String(user?.id || Date.now()), "Name": name, "Status": status, "Username": username})
            });
            setTimeout(loadPlayers, 800);
        }

        async function loadPlayers() {
            try {
                let res = await fetch(API_URL);
                let data = await res.json();
                let list = document.getElementById('list');
                
                let going = data.filter(p => p.Status === 'ЙДУ');
                let thinking = data.filter(p => p.Status === 'ДУМАЮ');
                
                document.getElementById('seats-info').innerText = going.length + " / 15";
                
                let html = "";

                // Підтверджені
                if (going.length > 0) {
                    html += `<div class="list-section-title">Підтвердили <span>${going.length}</span></div>`;
                    going.forEach(p => {
                        let initials = p.Name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
                        html += `
                            <div class="player-item status-confirmed">
                                <div class="avatar-stub">${initials}</div>
                                <div class="player-name"><a onclick="tg.openTelegramLink('https://t.me/${p.Username.replace('@','')}')">${p.Name}</a></div>
                            </div>`;
                    });
                }

                // Ті, хто думають
                if (thinking.length > 0) {
                    html += `<div class="list-section-title" style="border-color: var(--maybe-color); color: var(--maybe-color);">Можливо <span>${thinking.length}</span></div>`;
                    thinking.forEach(p => {
                        let initials = p.Name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
                        html += `
                            <div class="player-item status-maybe">
                                <div class="avatar-stub">${initials}</div>
                                <div class="player-name"><a onclick="tg.openTelegramLink('https://t.me/${p.Username.replace('@','')}')">${p.Name}</a></div>
                            </div>`;
                    });
                }

                if (html === "") html = "<div style='padding:40px; color:#444; font-size:12px; letter-spacing:1px;'>ПОКИ НІХТО НЕ ЗАПИСАВСЯ</div>";
                list.innerHTML = html;

            } catch (e) { list.innerHTML = "Помилка завантаження..."; }
        }
        
        window.onload = () => document.getElementById('indicator').style.transform = `translateX(0%)`;
    </script>
</body>
</html>
